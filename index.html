<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Analyzer Suite</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-chart-line"></i>
                <span>Analyzer Suite V1.1</span>
            </div>

            <!-- Elemen T-Rex Animation -->
            <div class="running-text-container">
                <div class="running-trex">
                    <img class="trex-gif"
                        src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExeGlvN3FpZDl6bGU3MGEyc2JtbHJtM3RwYzI1bnh0aDVuMWd0bGdvbyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/UYmaQr42dB5EalLlim/giphy.gif"
                        alt="Running T-Rex GIF">
                </div>
            </div>

        </div>
    </nav>


    <!-- Main Dashboard -->
    <div class="container main-dashboard">
        <div class="dashboard-header">
            <h1>Pilih tools Analisis</h1>
        </div>

        <div class="tools-grid">
            <!-- Excel Analyzer -->
            <a href="excel-analyzer.html" class="tool-card-link">
                <div class="tool-card">
                    <div class="tool-icon">
                        <i class="fas fa-file-excel"></i>
                    </div>
                    <h3 class="tool-title">Sub Account</h3>
                </div>
            </a>

            <!-- Offline Analyzer -->
            <a href="offline-analyzer.html" class="tool-card-link">
                <div class="tool-card">
                    <div class="tool-icon">
                        <i class="fas fa-database"></i>
                    </div>
                    <h3 class="tool-title">Offline</h3>
                </div>
            </a>

            <!-- IP & Location Validator -->
            <a href="iplocationvalidator.html" class="tool-card-link">
                <div class="tool-card">
                    <div class="tool-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <h3 class="tool-title">Miner vs Dashboard</h3>
                </div>
            </a>

            <!-- Data Matcher -->
            <a href="data-matcher.html" class="tool-card-link">
                <div class="tool-card">
                    <div class="tool-icon">
                        <i class="fas fa-link"></i>
                    </div>
                    <h3 class="tool-title">F2pool vs Dashboard</h3>
                </div>
            </a>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer-bottom">
        <p>&copy; 2026 Data Analyzer Suite. All rights reserved.</p>
    </div>
</body>

</html>
